<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="input.css">
</head>
<body class="bg-purple-300 min-h-screen">

  <nav class="bg-gray-600 px-5 py-3 flex items-center justify-between fixed top-0 w-full z-10">
    <div class="flex items-center gap-5">
      <span class="text-white font-bold text-base">Simple Notes</span>

    </div>
    <input
      type="text"
      id="searchInput"
      placeholder="Search notes here..."
      class="px-4 py-1 rounded-full text-sm w-48 bg-white"
    />
  </nav>

  <div class="max-w-3xl mx-auto mt-8 px-4">

    <h1 class="text-center text-2xl font-bold mb-6 text-black">
      Simple Notes App
    </h1>

    <div class="bg-white rounded-md p-5 mb-8 border hover:border-3 hover:border-gray-700">
      <h2 class="text-sm font-medium text-gray-700 mb-2">Create New Note</h2>
      <textarea
        id="noteInput"
        placeholder="Write your note here..."
        class="w-full h-24 border border-gray-300 rounded p-2 text-sm resize-y outline-none focus:border-blue-600"
      ></textarea>
      <div class="flex justify-end gap-2 mt-3">
        <button id="addBtn"
          class="bg-blue-600 hover:bg-blue-800 text-white text-sm px-4 py-2 rounded cursor-pointer">
          Add Note
        </button>
        <button id="cancelBtn"
          class="bg-white hover:bg-gray-100 text-gray-700 text-sm px-4 py-2 rounded border border-gray-300 cursor-pointer">
          Cancel
        </button>
      </div>
    </div>

    <div class="flex justify-between items-center mb-4">
  <h2 class="text-center text-2xl font-bold text-black">Notes List :</h2>
  <span id="notesCount" class="text-sm text-black"></span>
  <button id="deleteAllBtn" class="bg-red-700 hover:bg-red-800 text-white text-sm px-4 py-1 rounded cursor-pointer">
    Delete All
  </button>
</div>
    <div id="notesList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
